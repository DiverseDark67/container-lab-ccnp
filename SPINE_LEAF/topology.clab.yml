name: spine-leaf

topology:
  kinds: 
    cisco_n9kv:
      image: vrnetlab/cisco_n9kv:10.5.5
      env:
        VCPU: 4
        RAM: 8192
      
  nodes:
    # ---- Spines ----
    spine1:
      kind: cisco_n9kv
      startup-config: startup-configs/spine1.cfg
      mgmt-ipv4: 172.20.20.2

    spine2:
      kind: cisco_n9kv
      startup-config: startup-configs/spine2.cfg
      mgmt-ipv4: 172.20.20.3

    # ---- Leaves ----
    leaf1:
      kind: cisco_n9kv
      startup-config: startup-configs/leaf1.cfg
      mgmt-ipv4: 172.20.20.4

    leaf2:
      kind: cisco_n9kv
      startup-config: startup-configs/leaf2.cfg
      mgmt-ipv4: 172.20.20.5

    leaf3:
      kind: cisco_n9kv
      startup-config: startup-configs/leaf3.cfg
      mgmt-ipv4: 172.20.20.6

    leaf4:
      kind: cisco_n9kv
      startup-config: startup-configs/leaf4.cfg
      mgmt-ipv4: 172.20.20.7

  links:
    # ==========================================
    # Spine-to-Spine interconnect
    # ==========================================
    - endpoints: ["spine1:eth5", "spine2:eth5"]

    # ==========================================
    # Spine1 to Leaves (Ethernet1-4 on spine1)
    # ==========================================
    - endpoints: ["spine1:eth1", "leaf1:eth1"]
    - endpoints: ["spine1:eth2", "leaf2:eth1"]
    - endpoints: ["spine1:eth3", "leaf3:eth1"]
    - endpoints: ["spine1:eth4", "leaf4:eth1"]

    # ==========================================
    # Spine2 to Leaves (Ethernet1-4 on spine2)
    # ==========================================
    - endpoints: ["spine2:eth1", "leaf1:eth2"]
    - endpoints: ["spine2:eth2", "leaf2:eth2"]
    - endpoints: ["spine2:eth3", "leaf3:eth2"]
    - endpoints: ["spine2:eth4", "leaf4:eth2"]

    # ==========================================
    # MLAG Peer-Links (dual links per MLAG pair)
    # ==========================================
    # MLAG Domain A: leaf1 <-> leaf2
    - endpoints: ["leaf1:eth5", "leaf2:eth5"]
    - endpoints: ["leaf1:eth6", "leaf2:eth6"]

    # MLAG Domain B: leaf3 <-> leaf4
    - endpoints: ["leaf3:eth5", "leaf4:eth5"]
    - endpoints: ["leaf3:eth6", "leaf4:eth6"]
